name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Compilar extensao
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restaurar dependências
        run: dotnet restore CofreDeSenhas.sln

      - name: Compilar
        run: dotnet build CofreDeSenhas.sln -c Release --no-restore

      - name: Validar manifest da extensão
        shell: pwsh
        run: Get-Content extensao-navegador/manifest.json -Raw | ConvertFrom-Json | Out-Null
