name: CI

on:
  push:
    branches: [ prod, prodUnstable ]
  pull_request:
    branches: [ prod, prodUnstable ]

jobs:
  build:
    name: Compilar e testar (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restaurar dependências
        run: dotnet restore CofreDeSenhas.sln

      - name: Compilar
        run: dotnet build CofreDeSenhas.sln -c Release --no-restore

      - name: Executar testes
        run: dotnet test CofreDeSenhas.sln -c Release --no-build --verbosity normal
